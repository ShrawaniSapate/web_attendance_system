{% extends "base.html" %}
{% block body_class %}theme-admin{% endblock %}
{% block content %}
<div class="admin-shell row g-4">
    <div class="col-lg-3 col-xl-2">
        <aside class="admin-sidebar panel-card">
            <div class="admin-sidebar-head">
                <div class="page-kicker mb-1">Admin Menu</div>
                <h2 class="h5 mb-0">Control Panel</h2>
            </div>
            <nav class="admin-nav d-grid gap-2">
                <a class="admin-nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="{{ url_for('admin.dashboard') }}">Overview</a>
                <a class="admin-nav-link {% if active_page == 'students' %}active{% endif %}" href="{{ url_for('admin.manage_students') }}">Add / Update Student</a>
                <a class="admin-nav-link {% if active_page == 'teachers' %}active{% endif %}" href="{{ url_for('admin.manage_teachers') }}">Add / Update Teacher</a>
                <a class="admin-nav-link {% if active_page == 'timetable_create' %}active{% endif %}" href="{{ url_for('admin.create_timetable_page') }}">Create Timetable</a>
                <a class="admin-nav-link {% if active_page == 'timetable_adjustments' %}active{% endif %}" href="{{ url_for('admin.temporary_adjustments_page') }}">Emergency Adjustment</a>
                <a class="admin-nav-link {% if active_page == 'timetable_view' %}active{% endif %}" href="{{ url_for('admin.view_timetable') }}">View Timetable</a>
            </nav>
        </aside>
    </div>
    <div class="col-lg-9 col-xl-10">
        {% block admin_content %}{% endblock %}
    </div>
</div>
{% endblock %}
